<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
    background:#1B2D3B;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}
.box{
    background:white;
    padding:30px;
    border-radius:10px;
    width:300px;
    text-align:center;
}
input{
    width:100%;
    padding:10px;
    margin-top:10px;
}
button{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#1B2D3B;
    color:white;
}
p{color:gray;font-size:14px}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>
<p>het l id li chriti bch ta5od scan</p>

<input id="id" placeholder="Enter ID">
<button onclick="login()">Login</button>

</div>

<script>
const API = "http://212.132.120.102:12452";

function device(){
    let d = localStorage.getItem("device");
    if(!d){
        d = Math.random().toString(36).substring(2);
        localStorage.setItem("device", d);
    }
    return d;
}

async function login(){
    let id = document.getElementById("id").value;

    let res = await fetch(API+"/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            id:id,
            device:device()
        })
    });

    let data = await res.json();

    if(data.status=="success"){
        localStorage.setItem("id",id);
        window.location.href="index.html";
    }else{
        alert(data.msg);
    }
}
</script>

</body>
</html>
