<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Login</title>
</head>
<body style="text-align:center;margin-top:100px">

<h2>kteb id li chriti bach ta5od access</h2>

<input id="codeInput" placeholder="Enter code">
<button onclick="login()">Login</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = "https://ifvykzswrfcclmwwtler.supabase.co/rest/v1/";
const supabaseKey = "sb_publishable_nJUqmzu-JTXQcKKZbws4sQ_dBafI91Q";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// device id
let device = localStorage.getItem("device_id");
if (!device) {
  device = Math.random().toString(36).substring(2);
  localStorage.setItem("device_id", device);
}

async function login() {
  const code = document.getElementById("codeInput").value;

  let { data } = await supabase
    .from("codes")
    .select("*")
    .eq("code", code)
    .single();

  if (!data) {
    alert("❌ code incorrect");
    return;
  }

  if (!data.device_id) {
    await supabase
      .from("codes")
      .update({ device_id: device })
      .eq("code", code);

    localStorage.setItem("access", "true");
    window.location.href = "index.html";
  }

  else if (data.device_id === device) {
    localStorage.setItem("access", "true");
    window.location.href = "index.html";
  }

  else {
    alert("❌ هذا الكود مستعمل في جهاز آخر");
  }
}
</script>

</body>
</html>
