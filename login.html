<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
</head>

<body>

<h2>Login</h2>

<input id="id" placeholder="Enter ID">
<button onclick="login()">Login</button>

<script>
// ⚠️ JSON local simulation (NOT real multi-device sync)
let db = {
    "4821": {used:false},
    "7394": {used:false},
    "1562": {used:false},
    "9083": {used:false}
};

// fake device id
function device(){
    let d = localStorage.getItem("device");
    if(!d){
        d = Math.random().toString(36).substring(2);
        localStorage.setItem("device", d);
    }
    return d;
}

function login(){
    let id = document.getElementById("id").value;

    if(!db[id]){
        alert("Invalid ID");
        return;
    }

    // check if already used globally (fake)
    if(db[id].used){
        alert("ID already used");
        return;
    }

    // mark as used
    db[id].used = true;

    localStorage.setItem("logged", id);

    alert("Login success");
    window.location.href = "index.html";
}
</script>

</body>
</html>
