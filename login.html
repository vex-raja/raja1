<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg, #1B2D3B, #0f172a);
}

.box{
    width:320px;
    padding:25px;
    background:#ffffff10;
    backdrop-filter: blur(10px);
    border:1px solid #ffffff20;
    border-radius:15px;
    text-align:center;
    color:white;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h1{
    margin-bottom:10px;
}

p{
    font-size:14px;
    opacity:0.8;
    margin-bottom:20px;
}

input{
    width:90%;
    padding:10px;
    border:none;
    border-radius:8px;
    margin-bottom:15px;
    outline:none;
    text-align:center;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#16a34a;
}

.error{
    color:#ff4d4d;
    margin-top:10px;
    font-size:13px;
}
</style>
</head>

<body>

<div class="box">
    <h1>Login</h1>
    
    <p>khasek thet lcode bch td5ol</p>

    <input type="password" id="code" placeholder="Enter code">

    <button onclick="login()">Enter</button>

    <div class="error" id="error"></div>
</div>

<script>
function login(){
    let code = document.getElementById("code").value;

    if(code === "greenboysvexhader"){
        localStorage.setItem("logged","true");
        window.location.href = "index.html";
    } else {
        document.getElementById("error").innerText = "Wrong code!";
    }
}
</script>

</body>
</html>
