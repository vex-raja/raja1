<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #1B2D3B;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: #fff;
    padding: 30px;
    border-radius: 12px;
    width: 300px;
    text-align: center;
}

h2 {
    margin-bottom: 10px;
}

p {
    font-size: 14px;
    color: gray;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    border: 1px solid #ccc;
    border-radius: 6px;
}

button {
    margin-top: 15px;
    width: 100%;
    padding: 10px;
    border: none;
    background: #1B2D3B;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #2c4b60;
}

#error {
    color: red;
    margin-top: 10px;
}
</style>

</head>
<body>

<div class="box">
    <h2>Login</h2>
    <p>het l id li chriti bch ta5od scan</p>

    <input type="text" id="id" placeholder="Enter your ID">
    <button onclick="login()">Login</button>

    <div id="error"></div>
</div>

<script>
const API = "http://212.132.120.102:12452";

function getDeviceId() {
    let device = localStorage.getItem("device_id");
    if (!device) {
        device = Math.random().toString(36).substring(2);
        localStorage.setItem("device_id", device);
    }
    return device;
}

async function login() {
    const id = document.getElementById("id").value;
    const device = getDeviceId();

    const res = await fetch(API + "/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id, device })
    });

    const data = await res.json();

    if (data.status === "success") {
        localStorage.setItem("user_id", id);
        window.location.href = "index.html";
    } else {
        document.getElementById("error").innerText = data.msg;
    }
}
</script>

</body>
</html>
